kind = "web"
previewPath = "/"
title = "Sworn Translator"
version = "1.0.0"
id = "artifacts/sworn-translator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24598

[services.development]
run = "pnpm --filter @workspace/sworn-translator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sworn-translator", "run", "build" ]
publicDir = "artifacts/sworn-translator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24598"
BASE_PATH = "/"
